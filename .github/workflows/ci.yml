name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check shell scripts parse
        run: find tools/ scripts/ bin/ .claude/hooks/ -name "*.sh" -exec bash -n {} \;

      - name: Check Python syntax
        run: python3 -m py_compile mcp/server.py

      - name: Check executable permissions
        run: |
          for f in bin/aire-agent bin/aire-setup tools/*.sh; do
            if [ -e "$f" ]; then
              if [ ! -x "$f" ]; then
                echo "ERROR: $f is not executable"
                exit 1
              fi
            fi
          done

  unit-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install bats-core
        run: |
          git clone https://github.com/bats-core/bats-core.git /tmp/bats
          sudo /tmp/bats/install.sh /usr/local

      - name: Run bats tests
        run: bats tests/unit/*.bats

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install pytest rich

      - name: Run pytest
        run: python3 -m pytest tests/unit/*.py -v

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install rich

      - name: Test MCP server
        run: |
          echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"test","version":"1.0"}}}' | python3 mcp/server.py | grep -q '"result"'

      - name: Test CLI
        run: |
          ./bin/aire-agent --version
          ./bin/aire-agent info | grep -q "AIRE"
          ./bin/aire-agent modules | grep -qi "cuda"

      - name: Validate templates
        run: |
          for f in templates/jobs/*.sh; do
            ./tools/validate-script.sh "$f"
          done

  install-test:
    runs-on: ${{ matrix.os }}
    needs: unit-tests
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Verify install script
        run: bash -n install.sh

      - name: Verify structure
        run: |
          for dir in bin tools mcp scripts knowledge templates; do
            test -d "$dir" || exit 1
          done
